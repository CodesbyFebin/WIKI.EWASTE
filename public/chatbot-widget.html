<!DOCTYPE html>
<html lang="en-IN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EWaste Kochi AI Chat Widget</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Outfit:wght@700;800;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --g:#00C896;--gd:#00A87C;--gl:rgba(0,200,150,.12);
  --n:#090F1A;--nb:#0D1B2E;--nm:#132338;
  --w:#FFFFFF;--ow:#F4F9FF;
  --t:#E8F4FF;--tm:#8BA8C4;
  --brd:rgba(0,200,150,.2);
  --sh:0 8px 40px rgba(0,0,0,.35);
  --r:16px;--rs:10px;
  --fd:'Outfit',sans-serif;
  --fb:'Plus Jakarta Sans',sans-serif;
  --fm:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fb);background:transparent;overflow:hidden}

/* ── Chat Trigger ─────────────────────────────────────────── */
.chat-trigger{
  position:fixed;bottom:24px;right:24px;z-index:9998;
  width:64px;height:64px;border-radius:50%;
  background:linear-gradient(135deg,var(--g),var(--gd));
  box-shadow:0 6px 28px rgba(0,200,150,.45),0 0 0 0 rgba(0,200,150,.3);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;border:none;transition:all .3s;
  animation:ripple 2.5s infinite;
}
.chat-trigger:hover{transform:scale(1.08);box-shadow:0 10px 40px rgba(0,200,150,.55)}
@keyframes ripple{
  0%,100%{box-shadow:0 6px 28px rgba(0,200,150,.45),0 0 0 0 rgba(0,200,150,.3)}
  50%{box-shadow:0 6px 28px rgba(0,200,150,.45),0 0 0 14px rgba(0,200,150,0)}
}
.trigger-icon{position:relative;width:30px;height:30px}
.trigger-icon svg{width:30px;height:30px;fill:var(--n)}
.trigger-badge{
  position:absolute;top:-6px;right:-6px;
  width:18px;height:18px;background:#FF4444;
  border-radius:50%;border:2px solid white;
  display:flex;align-items:center;justify-content:center;
  font-size:.6rem;font-weight:800;color:#fff;
  animation:badge-bounce .5s infinite alternate;
}
@keyframes badge-bounce{0%{transform:scale(1)}100%{transform:scale(1.2)}}

/* ── Proactive Bubble (shows at 8s before auto-open) ─────── */
.proactive-bubble{
  position:fixed;bottom:100px;right:24px;z-index:9997;
  background:var(--nb);border:1px solid var(--brd);
  border-radius:16px 16px 4px 16px;
  padding:14px 18px;max-width:260px;
  box-shadow:var(--sh);cursor:pointer;
  display:none;flex-direction:column;gap:6px;
  animation:pop-in .4s cubic-bezier(.175,.885,.32,1.275);
}
@keyframes pop-in{0%{transform:scale(.85) translateY(10px);opacity:0}100%{transform:scale(1) translateY(0);opacity:1}}
.proactive-bubble p{font-size:.84rem;color:var(--t);font-weight:500;line-height:1.4}
.proactive-bubble span{font-size:.72rem;color:var(--g);font-family:var(--fm)}
.pb-close{
  position:absolute;top:8px;right:10px;
  background:none;border:none;cursor:pointer;
  color:var(--tm);font-size:.75rem;line-height:1;
  padding:2px 4px;
}
.pb-close:hover{color:var(--w)}
.pb-arrow{
  position:absolute;bottom:-8px;right:18px;
  width:0;height:0;
  border-left:8px solid transparent;
  border-right:8px solid transparent;
  border-top:8px solid var(--brd);
}
.pb-arrow::after{
  content:'';position:absolute;top:-9px;left:-7px;
  width:0;height:0;
  border-left:7px solid transparent;
  border-right:7px solid transparent;
  border-top:7px solid var(--nb);
}

/* ── Chat Window ──────────────────────────────────────────── */
.chat-window{
  position:fixed;bottom:100px;right:24px;z-index:9999;
  width:380px;max-height:600px;
  background:var(--nb);border:1px solid var(--brd);
  border-radius:var(--r);box-shadow:var(--sh);
  display:flex;flex-direction:column;overflow:hidden;
  transform:scale(.92) translateY(16px);
  transition:transform .35s cubic-bezier(.175,.885,.32,1.275),
             opacity .3s ease;
  opacity:0;pointer-events:none;
}
.chat-window.open{
  transform:scale(1) translateY(0);opacity:1;
  pointer-events:all;
}

/* ── Header ───────────────────────────────────────────────── */
.chat-header{
  background:linear-gradient(135deg,var(--nm),var(--n));
  padding:16px 18px;display:flex;align-items:center;
  gap:12px;border-bottom:1px solid var(--brd);flex-shrink:0;
}
.bot-avatar{
  width:40px;height:40px;border-radius:50%;
  background:linear-gradient(135deg,var(--g),var(--gd));
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  position:relative;
}
.bot-avatar svg{width:22px;height:22px;fill:var(--n)}
.bot-status{
  position:absolute;bottom:1px;right:1px;
  width:10px;height:10px;background:#44FF88;
  border-radius:50%;border:2px solid var(--nb);
  animation:status-blink 2s infinite;
}
@keyframes status-blink{0%,100%{opacity:1}50%{opacity:.4}}
.bot-info h4{font-family:var(--fd);font-size:.95rem;font-weight:800;color:var(--w)}
.bot-info span{font-size:.73rem;color:var(--g);font-family:var(--fm)}
.header-actions{margin-left:auto;display:flex;gap:4px;align-items:center}
.chat-close,.chat-minimize-btn{
  background:none;border:none;cursor:pointer;
  color:var(--tm);transition:color .2s;padding:4px;
}
.chat-close:hover,.chat-minimize-btn:hover{color:var(--w)}
.chat-close svg,.chat-minimize-btn svg{width:18px;height:18px}

/* ── Messages ─────────────────────────────────────────────── */
.chat-messages{
  flex:1;overflow-y:auto;padding:16px;
  display:flex;flex-direction:column;gap:10px;
  scrollbar-width:thin;scrollbar-color:var(--nm) transparent;
}
.chat-messages::-webkit-scrollbar{width:4px}
.chat-messages::-webkit-scrollbar-thumb{background:var(--nm);border-radius:2px}

.msg{display:flex;gap:8px;align-items:flex-end;max-width:90%}
.msg.bot{align-self:flex-start}
.msg.user{align-self:flex-end;flex-direction:row-reverse}

.msg-av{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--g),var(--gd));
  display:flex;align-items:center;justify-content:center;
}
.msg-av svg{width:14px;height:14px;fill:var(--n)}
.msg-bubble{
  padding:10px 14px;border-radius:14px;
  font-size:.85rem;line-height:1.55;max-width:260px;
}
.msg.bot .msg-bubble{
  background:var(--nm);color:var(--t);
  border-radius:4px 14px 14px 14px;
  border:1px solid rgba(255,255,255,.07);
}
.msg.user .msg-bubble{
  background:linear-gradient(135deg,var(--g),var(--gd));
  color:var(--n);font-weight:600;
  border-radius:14px 4px 14px 14px;
}
.msg-time{font-size:.65rem;color:var(--tm);margin-top:4px;padding:0 4px}

/* Typing */
.typing{display:flex;align-items:center;gap:4px;padding:12px 16px}
.typing-dot{width:7px;height:7px;background:var(--g);border-radius:50%;animation:tdot .9s infinite}
.typing-dot:nth-child(2){animation-delay:.15s}
.typing-dot:nth-child(3){animation-delay:.3s}
@keyframes tdot{0%,100%{transform:translateY(0);opacity:.4}50%{transform:translateY(-5px);opacity:1}}

/* Quick opts */
.quick-opts{padding:0 16px 12px;display:flex;flex-wrap:wrap;gap:7px}
.qopt{
  background:var(--nm);border:1px solid var(--brd);color:var(--g);
  padding:7px 13px;border-radius:100px;font-size:.78rem;font-weight:600;
  cursor:pointer;transition:all .2s;font-family:var(--fb);white-space:nowrap;
}
.qopt:hover{background:var(--g);color:var(--n);border-color:var(--g)}

/* Input */
.chat-input-wrap{
  padding:12px 14px;border-top:1px solid rgba(255,255,255,.06);
  display:flex;gap:10px;align-items:center;flex-shrink:0;
}
.chat-input{
  flex:1;background:var(--nm);border:1px solid rgba(255,255,255,.1);
  border-radius:100px;padding:10px 16px;color:var(--w);
  font-family:var(--fb);font-size:.85rem;outline:none;
  transition:border-color .2s;
}
.chat-input::placeholder{color:var(--tm)}
.chat-input:focus{border-color:var(--g)}
.send-btn{
  width:38px;height:38px;border-radius:50%;background:var(--g);
  border:none;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;transition:all .25s;
}
.send-btn:hover{background:var(--gd);transform:scale(1.05)}
.send-btn svg{width:16px;height:16px;fill:var(--n)}

/* WhatsApp card */
.wa-card{
  margin:8px 0 0;
  background:linear-gradient(135deg,#075E54,#128C7E);
  border-radius:12px;padding:14px 16px;
  display:flex;align-items:center;gap:12px;
  cursor:pointer;transition:all .25s;text-decoration:none;
}
.wa-card:hover{transform:scale(1.01);box-shadow:0 4px 20px rgba(37,211,102,.3)}
.wa-card-ico{
  width:36px;height:36px;background:rgba(255,255,255,.15);
  border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.wa-card-ico svg{width:20px;height:20px;fill:white}
.wa-card-text h5{color:#fff;font-family:var(--fd);font-size:.88rem;font-weight:700}
.wa-card-text p{color:rgba(255,255,255,.7);font-size:.74rem;margin:0}
.wa-card-arrow{margin-left:auto;color:rgba(255,255,255,.6);font-size:1.1rem}

/* AI label */
.ai-label{
  display:flex;align-items:center;gap:5px;
  font-family:var(--fm);font-size:.65rem;color:var(--tm);
  padding:0 16px 6px;
}
.ai-dot{width:5px;height:5px;background:var(--g);border-radius:50%;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* Lead captured flash */
.lead-flash{
  position:absolute;inset:0;background:rgba(0,200,150,.07);
  border-radius:var(--r);pointer-events:none;
  animation:flash-in .5s ease forwards;
}
@keyframes flash-in{0%{opacity:0}30%{opacity:1}100%{opacity:0}}

@media(max-width:480px){
  .chat-window{width:calc(100vw - 16px);right:8px;bottom:90px;max-height:82vh}
  .chat-trigger{bottom:16px;right:16px}
  .proactive-bubble{right:8px;max-width:calc(100vw - 80px)}
}
</style>
</head>
<body>

<!-- TRIGGER BUTTON -->
<button class="chat-trigger" id="chatTrigger" aria-label="Chat with EWaste Kochi AI">
  <div class="trigger-icon">
    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12c0 1.85.5 3.58 1.37 5.06L2 22l4.94-1.37A9.95 9.95 0 0012 22c5.52 0 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
    <div class="trigger-badge" id="triggerBadge">1</div>
  </div>
</button>

<!-- PROACTIVE BUBBLE (shows at 8s) -->
<div class="proactive-bubble" id="proactiveBubble">
  <button class="pb-close" id="closePB">✕</button>
  <p>👋 Need <strong>free e-waste pickup</strong> in Kochi? We collect from your door!</p>
  <span>⚡ Responds in seconds</span>
  <div class="pb-arrow"></div>
</div>

<!-- CHAT WINDOW -->
<div class="chat-window" id="chatWindow" role="dialog" aria-label="EWaste Kochi AI Chat">
  <div class="chat-header">
    <div class="bot-avatar">
      <svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
      <div class="bot-status"></div>
    </div>
    <div class="bot-info">
      <h4>EWaste Kochi AI</h4>
      <span>🟢 Online · Responds instantly</span>
    </div>
    <div class="header-actions">
      <button class="chat-minimize-btn" id="chatMinBtn" aria-label="Minimise" title="Minimise">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14"/></svg>
      </button>
      <button class="chat-close" id="chatClose" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
  </div>

  <div class="chat-messages" id="chatMessages"></div>
  <div class="quick-opts" id="quickOpts"></div>

  <div class="ai-label">
    <div class="ai-dot"></div>
    Powered by Claude AI · EWaste Kochi
  </div>

  <div class="chat-input-wrap">
    <input class="chat-input" id="chatInput" type="text"
      placeholder="Ask anything about e-waste in Kochi…"
      autocomplete="off" maxlength="300">
    <button class="send-btn" id="sendBtn" aria-label="Send">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────
const PHONE      = "+91-8078581297";
const WA_NUM     = "918078581297";
const WA_BASE    = "https://wa.me/" + WA_NUM;
const AUTO_OPEN_DELAY   = 10000; // ms — auto-open after 10s
const PROACTIVE_DELAY   =  8000; // ms — show bubble 2s before auto-open
const SESSION_KEY       = "ewk_session_chatted";
const CLAUDE_PROXY      = "";    // optional: "/api/chat" — leave empty to skip AI

// ── STATE ─────────────────────────────────────────────────────
let isOpen          = false;
let leadData        = {};
let conversationHistory = [];
let awaitingInput   = null;
let autoOpenTimer   = null;
let proactiveTimer  = null;
let hasInteracted   = false;

// ── DOM REFS ──────────────────────────────────────────────────
const chatWindow   = document.getElementById('chatWindow');
const chatMessages = document.getElementById('chatMessages');
const chatInput    = document.getElementById('chatInput');
const quickOpts    = document.getElementById('quickOpts');
const proactiveBub = document.getElementById('proactiveBubble');
const badge        = document.getElementById('triggerBadge');

// ── OPEN / CLOSE ──────────────────────────────────────────────
function openChat(autoTriggered = false) {
  if (isOpen) return;
  isOpen = true;
  hasInteracted = true;
  sessionStorage.setItem(SESSION_KEY, '1');

  // Cancel pending timers
  clearTimeout(autoOpenTimer);
  clearTimeout(proactiveTimer);
  proactiveBub.style.display = 'none';
  badge.style.display = 'none';

  chatWindow.classList.add('open');
  chatInput.focus();

  if (chatMessages.children.length === 0) {
    startConversation(autoTriggered);
  }
}

function closeChat() {
  isOpen = false;
  chatWindow.classList.remove('open');
}

function minimizeChat() { closeChat(); }

document.getElementById('chatTrigger') .addEventListener('click', () => openChat(false));
document.getElementById('chatClose')   .addEventListener('click', closeChat);
document.getElementById('chatMinBtn')  .addEventListener('click', minimizeChat);
proactiveBub                           .addEventListener('click', () => openChat(false));
document.getElementById('closePB')    .addEventListener('click', e => {
  e.stopPropagation();
  proactiveBub.style.display = 'none';
  clearTimeout(autoOpenTimer);
});

// ── AUTO-OPEN TIMERS (skip if already chatted this session) ───
if (!sessionStorage.getItem(SESSION_KEY)) {
  // 8s → show proactive bubble
  proactiveTimer = setTimeout(() => {
    if (!isOpen) proactiveBub.style.display = 'flex';
  }, PROACTIVE_DELAY);

  // 10s → auto-open full chat
  autoOpenTimer = setTimeout(() => {
    if (!isOpen) openChat(true);
  }, AUTO_OPEN_DELAY);
}

// ── EXIT INTENT (desktop) ─────────────────────────────────────
document.addEventListener('mouseleave', e => {
  if (e.clientY <= 0 && !isOpen && !hasInteracted && !sessionStorage.getItem(SESSION_KEY)) {
    clearTimeout(autoOpenTimer);
    clearTimeout(proactiveTimer);
    proactiveBub.style.display = 'none';
    openChat(true);
  }
}, { once: true });

// ── MESSAGE HELPERS ───────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}
function nowTime() {
  return new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true});
}

function addMsg(role, text, isHtml = false) {
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;
  const content = isHtml ? text : esc(text);
  if (role === 'bot') {
    wrap.innerHTML = `
      <div class="msg-av"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg></div>
      <div>
        <div class="msg-bubble">${content}</div>
        <div class="msg-time">${nowTime()}</div>
      </div>`;
  } else {
    wrap.innerHTML = `
      <div>
        <div class="msg-bubble">${content}</div>
        <div class="msg-time" style="text-align:right">${nowTime()}</div>
      </div>`;
  }
  chatMessages.appendChild(wrap);
  chatMessages.scrollTop = chatMessages.scrollHeight;
  return wrap;
}

function addTypingIndicator() {
  const t = document.createElement('div');
  t.className = 'msg bot'; t.id = 'typing-indicator';
  t.innerHTML = `
    <div class="msg-av"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg></div>
    <div class="msg-bubble"><div class="typing">
      <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
    </div></div>`;
  chatMessages.appendChild(t);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}
function removeTypingIndicator() {
  document.getElementById('typing-indicator')?.remove();
}

function botSay(text, delay = 800, isHtml = false) {
  return new Promise(resolve => {
    addTypingIndicator();
    setTimeout(() => { removeTypingIndicator(); addMsg('bot', text, isHtml); resolve(); }, delay);
  });
}

function setOpts(opts) {
  quickOpts.innerHTML = '';
  opts.forEach(o => {
    const btn = document.createElement('button');
    btn.className = 'qopt';
    btn.textContent = o.label;
    btn.addEventListener('click', () => o.action());
    quickOpts.appendChild(btn);
  });
}

function addWACard(waUrl, title, subtitle) {
  const card = document.createElement('a');
  card.href = waUrl; card.target = '_blank'; card.rel = 'noopener';
  card.className = 'wa-card';
  card.innerHTML = `
    <div class="wa-card-ico">
      <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    </div>
    <div class="wa-card-text"><h5>${esc(title)}</h5><p>${esc(subtitle)}</p></div>
    <div class="wa-card-arrow">›</div>`;
  const wrap = document.createElement('div');
  wrap.className = 'msg bot';
  const inner = document.createElement('div');
  inner.appendChild(card);
  wrap.appendChild(inner);
  chatMessages.appendChild(wrap);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function flashLead() {
  const fl = document.createElement('div'); fl.className = 'lead-flash';
  chatWindow.style.position = 'fixed';
  chatWindow.appendChild(fl);
  setTimeout(() => fl.remove(), 600);
}

// ── CONVERSATION START ────────────────────────────────────────
async function startConversation(autoTriggered = false) {
  leadData = {}; conversationHistory = []; awaitingInput = null;

  if (autoTriggered) {
    // Proactive opener — more engaging
    await botSay("👋 Hey there! Noticed you're on the EWaste Kochi site.", 600);
    await botSay("Got any old laptops, phones, servers, or batteries lying around? We offer <strong>free doorstep pickup</strong> anywhere in Kochi! ♻️", 1300);
    await botSay("What can I help you with today?", 2000);
  } else {
    await botSay("Hi! 👋 I'm EWaste Kochi's AI assistant.", 600);
    await botSay("I can help you schedule <strong>free e-waste pickup</strong>, get price quotes, or handle <strong>corporate ITAD</strong> for your Kochi business. 🌿", 1200);
  }

  setOpts([
    { label: '♻️ Schedule Free Pickup', action: pickupFlow },
    { label: '💰 Get Price Quote',       action: priceFlow },
    { label: '🏢 Corporate ITAD',        action: corporateFlow },

    { label: '❓ Ask a Question',         action: askFlow },

// ── INPUT HANDLER ─────────────────────────────────────────────
document.getElementById('sendBtn').addEventListener('click', handleInput);
chatInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleInput(); });

async function handleInput() {
  const val = chatInput.value.trim();
  if (!val) return;
  chatInput.value = '';

  if (awaitingInput === 'freeform') {
    addMsg('user', val);
    await handleFreeform(val);
    return;
  }

  if (awaitingInput === 'items') {
    leadData.items = val; awaitingInput = null;
    chatInput.placeholder = 'Ask anything…';
    addMsg('user', val);
    await botSay(`Got it — <strong>${esc(val)}</strong>. 📦`, 600);
    await botSay("How many units approximately?", 1000);
    setOpts([
      { label: '1 – 10',       action: () => selectQty('1–10') },
      { label: '10 – 50',      action: () => selectQty('10–50') },
      { label: '50 – 200',     action: () => selectQty('50–200') },
      { label: '200 + (bulk)', action: () => selectQty('200+ (bulk)') },
    ]);
    return;
  }

  if (awaitingInput === 'company') {
    leadData.company = val; awaitingInput = null;
    chatInput.placeholder = 'Ask anything…';
    addMsg('user', val);
    await botSay(`Thanks, <strong>${esc(val)}</strong>! Approximately how many IT assets?`, 700);
    setOpts([
      { label: '50 – 200',  action: () => selectQty('50–200') },
      { label: '200 – 500', action: () => selectQty('200+') },
      { label: '500 – 1000',action: () => selectQty('200+ (bulk)') },
      { label: '1000 +',    action: () => selectQty('200+ (bulk)') },
    ]);
    return;
  }

  if (awaitingInput === 'name') {
    leadData.name = val; awaitingInput = 'phone';
    chatInput.placeholder = 'Your WhatsApp number…';
    addMsg('user', val);
    await botSay(`Hi <strong>${esc(val)}</strong>! 👋 Last step — your WhatsApp number so our team can confirm your slot?`, 700);
    return;
  }

  if (awaitingInput === 'phone') {
    leadData.phone = val; awaitingInput = null;
    chatInput.placeholder = 'Ask anything…';
    addMsg('user', val);
    await showSummary();
    return;
  }

  // Default: treat as freeform
  addMsg('user', val);
  await handleFreeform(val);
}

// ── AI FREEFORM (Claude proxy or fallback) ────────────────────
async function handleFreeform(question) {
  addTypingIndicator();
  conversationHistory.push({ role: 'user', content: question });

  if (!CLAUDE_PROXY) {
    // No proxy configured — go straight to WA
    removeTypingIndicator();
    await botSay("Great question! Let me connect you with our team — they'll answer instantly on WhatsApp. 💬", 400);
    offerWA(`Hi EWaste Kochi! Quick question: ${question}`);
    return;
  }

  const systemPrompt = `You are EWaste Kochi's AI sales assistant. Kerala's #1 certified ITAD & e-waste recycler in Thrippunithura, Kochi.

Services: Free e-waste pickup (all Ernakulam), NIST 800-88 data destruction, ITAD, HDD/SSD shredding ≤2mm, server recycling, laptop buyback, data-centre decommissioning.
Phone: ${PHONE} | WhatsApp: wa.me/${WA_NUM}
Key facts: Kerala PCB authorised, DPDP Act 2023 compliant, Certificate of Destruction per device, free bulk pickup, same-day before 11 AM, 5000+ clients, 4.9★.
Pricing: wipe from ₹150/device, shredding from ₹200/drive, pickup free for bulk.

Rules: Be warm, conversational, use emojis sparingly. Keep replies SHORT (2–3 sentences). Always move toward WhatsApp handoff or pickup booking. If unsure, direct to ${PHONE}.`;

  try {
    const res = await fetch(CLAUDE_PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ system: systemPrompt, messages: conversationHistory, max_tokens: 280 }),
    });
    const data = await res.json();
    removeTypingIndicator();
    const reply = data.content?.[0]?.text || data.reply || `For the fastest answer, WhatsApp us at ${PHONE}!`;
    addMsg('bot', reply);
    conversationHistory.push({ role: 'assistant', content: reply });
    if (conversationHistory.length >= 4) setTimeout(offerWA, 1500);
  } catch {
    removeTypingIndicator();
    addMsg('bot', `For the fastest answer, let me connect you to our team! 📲`);
    offerWA(`Hi! I have a question about: ${question}`);
  }
}

function offerWA(preMsg) {
  const waUrl = `${WA_BASE}?text=${encodeURIComponent(preMsg || 'Hi EWaste Kochi! I need help with e-waste disposal.')}`;
  addWACard(waUrl, 'Chat with Our Team on WhatsApp', 'Free quote · Instant reply · Available 9 AM – 7 PM');
}

// ── LEAD SUMMARY + HANDOFF ────────────────────────────────────
async function showSummary() {
  flashLead(); // visual confirmation flash
  const s = leadData;

  await botSay(`Perfect, <strong>${esc(s.name)}</strong>! Here's your booking summary:`, 600);

  const summaryHtml = `
    📋 <strong>Service:</strong> ${esc(s.service || 'E-Waste Pickup')}<br>
    📦 <strong>Items:</strong> ${esc(s.items || 'E-Waste')}<br>
    🔢 <strong>Quantity:</strong> ${esc(s.qty || 'TBC')}<br>
    📍 <strong>Location:</strong> ${esc(s.location || 'Kochi')}<br>
    📱 <strong>Contact:</strong> ${esc(s.phone)}`;
  addMsg('bot', summaryHtml, true);

  await botSay("✅ Our team will contact you within <strong>30 minutes</strong> to confirm your slot!", 1200);
  await botSay("Tap below to open WhatsApp — we'll send your slot confirmation there:", 2000);

  const waMsg = encodeURIComponent(
    `Hi EWaste Kochi! I'm ${s.name}, requesting ${s.service || 'e-waste pickup'} for ${s.items || 'equipment'} (${s.qty}) from ${s.location}, Kochi. My number: ${s.phone}. Please confirm my slot.`
  );
  addWACard(`${WA_BASE}?text=${waMsg}`, `Confirm Slot — ${esc(s.name)}`, `${esc(s.items)} · ${esc(s.location)} · ${esc(s.qty)}`);

  // Also silently push lead data to any parent page
  try {
    window.parent?.postMessage({ type: 'ewk_lead', lead: s }, '*');
  } catch {}

  setOpts([
    { label: '🔄 Start Over', action: () => {
      chatMessages.innerHTML = ''; quickOpts.innerHTML = '';
      leadData = {}; conversationHistory = []; awaitingInput = null;
      startConversation(false);
    }},
  ]);
}
