<!DOCTYPE html>
<html lang="en-IN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EWaste Kochi AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Outfit:wght@700;800;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --g:#00C896;--gd:#00A87C;
  --n:#090F1A;--nb:#0D1B2E;--nm:#132338;
  --w:#FFFFFF;--t:#E8F4FF;--tm:#8BA8C4;
  --brd:rgba(0,200,150,.2);
  --sh:0 8px 40px rgba(0,0,0,.38);
  --r:16px;
  --fd:'Outfit',sans-serif;
  --fb:'Plus Jakarta Sans',sans-serif;
  --fm:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fb);background:transparent;overflow:hidden}

/* ── Trigger ──────────────────────────────────────────────── */
.chat-trigger{
  position:fixed;bottom:max(24px,env(safe-area-inset-bottom,24px));right:24px;
  z-index:9998;width:64px;height:64px;border-radius:50%;
  background:linear-gradient(135deg,var(--g),var(--gd));
  box-shadow:0 6px 28px rgba(0,200,150,.45),0 0 0 0 rgba(0,200,150,.3);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;border:none;transition:all .3s;
  animation:ripple 2.5s infinite;pointer-events:all;
}
.chat-trigger:hover{transform:scale(1.08)}
@keyframes ripple{
  0%,100%{box-shadow:0 6px 28px rgba(0,200,150,.45),0 0 0 0 rgba(0,200,150,.3)}
  50%{box-shadow:0 6px 28px rgba(0,200,150,.45),0 0 0 14px rgba(0,200,150,0)}
}
.trigger-icon{position:relative;width:30px;height:30px}
.trigger-icon svg{width:30px;height:30px;fill:var(--n)}
.trigger-badge{
  position:absolute;top:-6px;right:-6px;width:18px;height:18px;
  background:#FF4444;border-radius:50%;border:2px solid #fff;
  display:flex;align-items:center;justify-content:center;
  font-size:.6rem;font-weight:800;color:#fff;
  animation:badge-pulse .5s infinite alternate;
}
@keyframes badge-pulse{0%{transform:scale(1)}100%{transform:scale(1.2)}}

/* ── Proactive bubble ──────────────────────────────────────── */
.proactive-bubble{
  position:fixed;
  bottom:max(100px,calc(env(safe-area-inset-bottom,0px) + 76px));
  right:24px;z-index:9997;
  background:var(--nb);border:1px solid var(--brd);
  border-radius:16px 16px 4px 16px;padding:14px 18px 14px 14px;
  max-width:270px;box-shadow:var(--sh);cursor:pointer;
  display:none;flex-direction:column;gap:5px;
  animation:pop-in .4s cubic-bezier(.175,.885,.32,1.275);
  pointer-events:all;
}
@keyframes pop-in{0%{transform:scale(.85) translateY(10px);opacity:0}100%{transform:scale(1) translateY(0);opacity:1}}
.proactive-bubble p{font-size:.84rem;color:var(--t);font-weight:500;line-height:1.4}
.proactive-bubble span{font-size:.7rem;color:var(--g);font-family:var(--fm)}
.pb-close{
  position:absolute;top:7px;right:9px;
  background:none;border:none;cursor:pointer;
  color:var(--tm);font-size:.72rem;padding:2px 5px;line-height:1;
}
.pb-close:hover{color:var(--w)}

/* ── Chat window ───────────────────────────────────────────── */
.chat-window{
  position:fixed;
  bottom:max(100px,calc(env(safe-area-inset-bottom,0px)+76px));
  right:24px;z-index:9999;
  width:380px;max-height:600px;
  background:var(--nb);border:1px solid var(--brd);
  border-radius:var(--r);box-shadow:var(--sh);
  display:flex;flex-direction:column;overflow:hidden;
  transform:scale(.92) translateY(16px);opacity:0;
  transition:transform .35s cubic-bezier(.175,.885,.32,1.275),opacity .3s ease;
  pointer-events:none;
}
.chat-window.open{transform:scale(1) translateY(0);opacity:1;pointer-events:all}

/* ── Header ────────────────────────────────────────────────── */
.chat-header{
  background:linear-gradient(135deg,var(--nm),var(--n));
  padding:12px 16px;display:flex;align-items:center;gap:12px;
  border-bottom:1px solid var(--brd);flex-shrink:0;
}
.bot-avatar{
  width:38px;height:38px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--g),var(--gd));
  display:flex;align-items:center;justify-content:center;position:relative;
}
.bot-avatar svg{width:20px;height:20px;fill:var(--n)}
.bot-status{
  position:absolute;bottom:1px;right:1px;width:9px;height:9px;
  background:#44FF88;border-radius:50%;border:2px solid var(--nb);
  animation:blink 2s infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.bot-meta{flex:1;min-width:0}
.bot-meta h4{font-family:var(--fd);font-size:.9rem;font-weight:800;color:var(--w);line-height:1.2}
.bot-meta .status-line{font-size:.68rem;color:var(--g);font-family:var(--fm)}
.trust-strip{
  display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;
}
.trust-badge{
  font-size:.58rem;font-weight:700;font-family:var(--fm);
  background:rgba(0,200,150,.12);color:var(--g);
  border:1px solid rgba(0,200,150,.25);border-radius:4px;
  padding:1px 5px;white-space:nowrap;
}
.header-actions{margin-left:auto;display:flex;gap:2px;flex-shrink:0}
.hbtn{background:none;border:none;cursor:pointer;color:var(--tm);transition:color .2s;padding:4px}
.hbtn:hover{color:var(--w)}
.hbtn svg{width:17px;height:17px}

/* ── Messages ──────────────────────────────────────────────── */
.chat-messages{
  flex:1;overflow-y:auto;padding:14px;
  display:flex;flex-direction:column;gap:10px;
  scrollbar-width:thin;scrollbar-color:var(--nm) transparent;
}
.chat-messages::-webkit-scrollbar{width:4px}
.chat-messages::-webkit-scrollbar-thumb{background:var(--nm);border-radius:2px}
.msg{display:flex;gap:7px;align-items:flex-end;max-width:92%}
.msg.bot{align-self:flex-start}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg-av{
  width:26px;height:26px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--g),var(--gd));
  display:flex;align-items:center;justify-content:center;
}
.msg-av svg{width:13px;height:13px;fill:var(--n)}
.msg-bubble{padding:9px 13px;border-radius:13px;font-size:.84rem;line-height:1.55;max-width:260px}
.msg.bot .msg-bubble{
  background:var(--nm);color:var(--t);
  border-radius:4px 13px 13px 13px;
  border:1px solid rgba(255,255,255,.07);
}
.msg.user .msg-bubble{
  background:linear-gradient(135deg,var(--g),var(--gd));
  color:var(--n);font-weight:600;border-radius:13px 4px 13px 13px;
}
.msg-time{font-size:.62rem;color:var(--tm);margin-top:3px;padding:0 3px}

/* Typing */
.typing{display:flex;align-items:center;gap:4px;padding:10px 14px}
.tdot{width:6px;height:6px;background:var(--g);border-radius:50%;animation:td .9s infinite}
.tdot:nth-child(2){animation-delay:.15s}.tdot:nth-child(3){animation-delay:.3s}
@keyframes td{0%,100%{transform:translateY(0);opacity:.4}50%{transform:translateY(-5px);opacity:1}}

/* Snippet citation */
.snippet-badge{
  font-size:.65rem;font-family:var(--fm);color:var(--g);
  background:rgba(0,200,150,.08);border:1px solid rgba(0,200,150,.2);
  border-radius:4px;padding:1px 6px;display:inline-block;margin-top:5px;
}

/* Quick options */
.quick-opts{padding:0 14px 10px;display:flex;flex-wrap:wrap;gap:6px}
.qopt{
  background:var(--nm);border:1px solid var(--brd);color:var(--g);
  padding:6px 12px;border-radius:100px;font-size:.77rem;font-weight:600;
  cursor:pointer;transition:all .2s;font-family:var(--fb);white-space:nowrap;
  pointer-events:all;
}
.qopt:hover{background:var(--g);color:var(--n);border-color:var(--g)}

/* Input */
.chat-input-wrap{
  padding:10px 12px;border-top:1px solid rgba(255,255,255,.06);
  display:flex;gap:8px;align-items:center;flex-shrink:0;
  padding-bottom:max(10px,env(safe-area-inset-bottom,10px));
}
.chat-input{
  flex:1;background:var(--nm);border:1px solid rgba(255,255,255,.1);
  border-radius:100px;padding:9px 15px;color:var(--w);
  font-family:var(--fb);font-size:.84rem;outline:none;
  transition:border-color .2s;
}
.chat-input::placeholder{color:var(--tm)}
.chat-input:focus{border-color:var(--g)}
.send-btn{
  width:36px;height:36px;border-radius:50%;background:var(--g);
  border:none;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;transition:all .25s;
  pointer-events:all;
}
.send-btn:hover{background:var(--gd);transform:scale(1.06)}
.send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.send-btn svg{width:15px;height:15px;fill:var(--n)}

/* WhatsApp card */
.wa-card{
  margin:6px 0 0;background:linear-gradient(135deg,#075E54,#128C7E);
  border-radius:11px;padding:13px 15px;
  display:flex;align-items:center;gap:11px;
  cursor:pointer;transition:all .25s;text-decoration:none;pointer-events:all;
}
.wa-card:hover{transform:scale(1.01);box-shadow:0 4px 18px rgba(37,211,102,.3)}
.wa-card-ico{width:34px;height:34px;background:rgba(255,255,255,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.wa-card-ico svg{width:19px;height:19px;fill:white}
.wa-card-text h5{color:#fff;font-family:var(--fd);font-size:.86rem;font-weight:700}
.wa-card-text p{color:rgba(255,255,255,.7);font-size:.72rem;margin:0}
.wa-card-arr{margin-left:auto;color:rgba(255,255,255,.6);font-size:1.1rem}

/* AI label */
.ai-label{
  display:flex;align-items:center;gap:5px;
  font-family:var(--fm);font-size:.63rem;color:var(--tm);
  padding:0 14px 5px;
}
.ai-dot{width:5px;height:5px;background:var(--g);border-radius:50%;animation:blink 2s infinite}

/* Lead flash */
.lead-flash{
  position:absolute;inset:0;border-radius:var(--r);
  pointer-events:none;background:rgba(0,200,150,.07);
  animation:flash .6s ease forwards;
}
@keyframes flash{0%{opacity:0}25%{opacity:1}100%{opacity:0}}

/* Reduced motion */
@media (prefers-reduced-motion:reduce){
  .chat-window,.chat-trigger{transition:none;animation:none}
  .tdot,.ai-dot,.bot-status,.trigger-badge{animation:none;opacity:1}
}

/* Mobile */
@media(max-width:480px){
  .chat-window{width:calc(100vw - 16px);right:8px}
  .chat-trigger,.proactive-bubble{right:12px}
  .proactive-bubble{max-width:calc(100vw - 90px)}
}
</style>
</head>
<body>

<!-- TRIGGER -->
<button class="chat-trigger" id="chatTrigger" aria-label="Chat with EWaste Kochi AI">
  <div class="trigger-icon">
    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12c0 1.85.5 3.58 1.37 5.06L2 22l4.94-1.37A9.95 9.95 0 0012 22c5.52 0 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
    <div class="trigger-badge" id="badge">1</div>
  </div>
</button>

<!-- PROACTIVE BUBBLE -->
<div class="proactive-bubble" id="pbubble" role="button" tabindex="0">
  <button class="pb-close" id="pbClose">✕</button>
  <p id="pbText">👋 Need <strong>free e-waste pickup</strong> in Kochi?</p>
  <span>⚡ Responds instantly</span>
</div>

<!-- CHAT WINDOW -->
<div class="chat-window" id="chatWindow" role="dialog" aria-label="EWaste Kochi AI Chat">
  <div class="chat-header">
    <div class="bot-avatar">
      <svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
      <div class="bot-status"></div>
    </div>
    <div class="bot-meta">
      <h4>EWaste Kochi AI</h4>
      <div class="status-line">🟢 Online · Responds instantly</div>
      <div class="trust-strip">
        <span class="trust-badge">✓ CPCB</span>
        <span class="trust-badge">✓ Kerala PCB</span>
        <span class="trust-badge">✓ NIST 800-88</span>
        <span class="trust-badge">✓ ISO 27001</span>
        <span class="trust-badge">✓ DPDP 2023</span>
      </div>
    </div>
    <div class="header-actions">
      <button class="hbtn" id="minBtn" title="Minimise" aria-label="Minimise">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14"/></svg>
      </button>
      <button class="hbtn" id="closeBtn" title="Close" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
  </div>

  <div class="chat-messages" id="chatMessages"></div>
  <div class="quick-opts" id="quickOpts"></div>

  <div class="ai-label">
    <div class="ai-dot"></div>
    Powered by Claude AI · EWaste Kochi
  </div>

  <div class="chat-input-wrap">
    <input class="chat-input" id="chatInput" type="text"
      placeholder="Ask anything about e-waste in Kochi…"
      autocomplete="off" maxlength="400">
    <button class="send-btn" id="sendBtn" aria-label="Send">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
</div>

<script>
// ╔══════════════════════════════════════════════════════════╗
// ║  CONFIG                                                  ║
// ╚══════════════════════════════════════════════════════════╝
const PHONE       = '+91-7500555454';
const WA_NUM      = '917500555454';
const WA_BASE     = 'https://wa.me/' + WA_NUM;
const LEAD_EP     = '/api/widget-contact';
const SNIPPETS_EP = '/api/snippets';
const CLAUDE_PROXY = ''; // set to '/api/chat' when proxy is ready

const AUTO_OPEN_MS   = 10000;
const PROACTIVE_MS   =  8000;
const SESSION_KEY    = 'ewk_chat_v2';
const MAX_TURNS      = 30;
const SEND_COOLDOWN  = 1500; // ms between sends

// ╔══════════════════════════════════════════════════════════╗
// ║  PAGE CONTEXT MAP                                        ║
// ╚══════════════════════════════════════════════════════════╝
const PAGE_CTX = {
  'schedule-pickup': {
    bubble:  '♻️ Schedule your <strong>free pickup</strong> now — takes 2 mins!',
    greet:   'pickup-auto',
    autoCTA: true,
    suggestions: ['⏱️ Same-day pickup?', '📍 Coverage area?', '💰 Is it really free?'],
  },
  'itad': {
    bubble:  '🏢 IT assets to dispose? We handle <strong>bulk corporate ITAD</strong>.',
    greet:   'itad',
    autoCTA: false,
    suggestions: ['🔒 Data destruction certs?', '📋 Compliance docs?', '🏭 On-site pickup?'],
  },
  'compliance': {
    bubble:  '📋 Need <strong>EPR or CPCB compliance</strong> support?',
    greet:   'compliance',
    autoCTA: false,
    suggestions: ['📜 EPR registration?', '🏛️ CPCB authorised?', '📄 Compliance certificate?'],
  },
  'data-destruction': {
    bubble:  '🔒 Need <strong>NIST 800-88 certified</strong> data destruction?',
    greet:   'data',
    autoCTA: false,
    suggestions: ['📜 Certificate of Destruction?', '⚡ SSD secure wipe?', '🖴 HDD shredding?'],
  },
  'battery': {
    bubble:  '🔋 Battery recycling with <strong>free bulk pickup</strong> across Kerala.',
    greet:   'battery',
    autoCTA: false,
    suggestions: ['🔋 Li-ion disposal rules?', '⚡ EV battery recycling?', '♻️ Lead acid pickup?'],
  },
  'shredding': {
    bubble:  '🗂️ Secure <strong>document shredding</strong> with certificate?',
    greet:   'shredding',
    autoCTA: false,
    suggestions: ['📄 Paper shredding cert?', '🏢 On-site service?', '📁 Bulk volumes?'],
  },
  'kochi': {
    bubble:  '📍 Free e-waste collection anywhere in <strong>Kochi & Kerala</strong>.',
    greet:   'kochi',
    autoCTA: false,
    suggestions: ['🗺️ Coverage area?', '♻️ Schedule pickup', '🏢 Corporate ITAD'],
  },
  'esg': {
    bubble:  '🌱 ESG reporting & <strong>certified recycling</strong> for enterprises.',
    greet:   'esg',
    autoCTA: false,
    suggestions: ['📊 ESG documentation?', '🌿 Carbon offset certs?', '📋 Sustainability report?'],
  },
  'wiki': {
    bubble:  '💡 Question about e-waste? <strong>Ask our AI assistant.</strong>',
    greet:   'wiki',
    autoCTA: false,
    suggestions: null, // will be overridden by entities
  },
  'home': {
    bubble:  '👋 Need <strong>free e-waste pickup</strong> in Kochi?',
    greet:   'default',
    autoCTA: false,
    suggestions: ['♻️ Schedule Pickup', '💰 Price Quote', '🏢 Corporate ITAD'],
  },
};

// Entity → quick suggestion label map
const ENTITY_SUGGESTIONS = {
  'cpcb':      '🏛️ CPCB recycler auth?',
  'epr':       '📜 EPR compliance setup?',
  'nist-800-88': '🔒 NIST 800-88 wipe?',
  'kspcb':     '🌿 KSPCB Kerala rules?',
  'dpdp':      '⚖️ DPDP Act 2023?',
  'itad':      '💼 ITAD certification?',
  'weee':      '♻️ WEEE compliance?',
  'rohs':      '🧪 RoHS regulations?',
  'iso-14001': '🌱 ISO 14001 compliance?',
};

// ╔══════════════════════════════════════════════════════════╗
// ║  STATE                                                   ║
// ╚══════════════════════════════════════════════════════════╝
let isOpen        = false;
let leadData      = {};
let convoHistory  = [];
let awaitingInput = null;
let turnCount     = 0;
let lastSendMs    = 0;
let autoTimer     = null;
let proTimer      = null;

// Context injected by parent via postMessage
const CTX = {
  page:        'home',
  autoflow:    '',
  sourceUrl:   document.referrer || '',
  utmSource:   '',
  utmMedium:   '',
  utmCampaign: '',
  utmContent:  '',
  entities:    '',
};

// ╔══════════════════════════════════════════════════════════╗
// ║  DOM REFS                                                ║
// ╚══════════════════════════════════════════════════════════╝
const chatWindow   = document.getElementById('chatWindow');
const chatMessages = document.getElementById('chatMessages');
const chatInput    = document.getElementById('chatInput');
const quickOpts    = document.getElementById('quickOpts');
const pbubble      = document.getElementById('pbubble');
const badge        = document.getElementById('badge');

// ╔══════════════════════════════════════════════════════════╗
// ║  OPEN / CLOSE                                            ║
// ╚══════════════════════════════════════════════════════════╝
function openChat(auto = false) {
  if (isOpen) return;
  isOpen = true;
  clearTimeout(autoTimer); clearTimeout(proTimer);
  pbubble.style.display = 'none';
  badge.style.display   = 'none';
  sessionStorage.setItem(SESSION_KEY, '1');
  chatWindow.classList.add('open');
  chatInput.focus();
  track(auto ? 'chat_auto_opened' : 'chat_opened', { page: CTX.page });
  if (chatMessages.children.length === 0) startConvo(auto);
}
function closeChat() { isOpen = false; chatWindow.classList.remove('open'); }

document.getElementById('chatTrigger').addEventListener('click', () => openChat(false));
document.getElementById('closeBtn').addEventListener('click', closeChat);
document.getElementById('minBtn').addEventListener('click', closeChat);
pbubble.addEventListener('click', () => openChat(false));
pbubble.addEventListener('keydown', e => { if (e.key === 'Enter') openChat(false) });
document.getElementById('pbClose').addEventListener('click', e => {
  e.stopPropagation();
  pbubble.style.display = 'none';
  clearTimeout(autoTimer);
});

// ╔══════════════════════════════════════════════════════════╗
// ║  AUTO-OPEN TIMERS                                        ║
// ╚══════════════════════════════════════════════════════════╝
function startTimers() {
  if (sessionStorage.getItem(SESSION_KEY)) return;
  proTimer  = setTimeout(() => { if (!isOpen) showProactiveBubble(); }, PROACTIVE_MS);
  autoTimer = setTimeout(() => { if (!isOpen) openChat(true);        }, AUTO_OPEN_MS);
}
startTimers();

// Exit intent (desktop)
document.addEventListener('mouseleave', e => {
  if (e.clientY <= 0 && !isOpen && !sessionStorage.getItem(SESSION_KEY)) {
    clearTimeout(autoTimer); clearTimeout(proTimer);
    pbubble.style.display = 'none';
    openChat(true);
    track('exit_intent_triggered', { page: CTX.page });
  }
}, { once: true });

function showProactiveBubble() {
  const ctx = PAGE_CTX[CTX.page] || PAGE_CTX['home'];
  document.getElementById('pbText').innerHTML = ctx.bubble;
  pbubble.style.display = 'flex';
}

// ╔══════════════════════════════════════════════════════════╗
// ║  CONTEXT FROM PARENT (postMessage)                       ║
// ╚══════════════════════════════════════════════════════════╝
window.addEventListener('message', e => {
  if (!e.data || e.data.type !== 'ewk_context') return;
  const d = e.data;
  if (d.page)        CTX.page        = d.page;
  if (d.autoflow)    CTX.autoflow    = d.autoflow;
  if (d.sourceUrl)   CTX.sourceUrl   = d.sourceUrl;
  if (d.utmSource)   CTX.utmSource   = d.utmSource;
  if (d.utmMedium)   CTX.utmMedium   = d.utmMedium;
  if (d.utmCampaign) CTX.utmCampaign = d.utmCampaign;
  if (d.utmContent)  CTX.utmContent  = d.utmContent;
  if (d.entities)    CTX.entities    = d.entities;
  leadData.pageType  = CTX.page;
  leadData.sourcePage = CTX.sourceUrl;

  // Auto-start pickup flow if schedule-pickup service page
  if (CTX.autoflow === 'pickup' && !isOpen && !sessionStorage.getItem(SESSION_KEY)) {
    clearTimeout(autoTimer); clearTimeout(proTimer);
    autoTimer = setTimeout(() => { if (!isOpen) openChat(true); }, 3000);
  }
});

// ╔══════════════════════════════════════════════════════════╗
// ║  ANALYTICS                                               ║
// ╚══════════════════════════════════════════════════════════╝
function track(event, params) {
  // Fire to parent window (which has gtag)
  try { window.parent.postMessage({ type: 'ewk_event', event, params: params || {} }, '*'); } catch {}
}

// ╔══════════════════════════════════════════════════════════╗
// ║  RENDERING HELPERS                                       ║
// ╚══════════════════════════════════════════════════════════╝
function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function nowTime() {
  return new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true});
}

const BOT_AV = `<div class="msg-av"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg></div>`;

function addMsg(role, text, isHtml = false) {
  const w = document.createElement('div');
  w.className = `msg ${role}`;
  const content = isHtml ? text : esc(text);
  if (role === 'bot') {
    w.innerHTML = `${BOT_AV}<div><div class="msg-bubble">${content}</div><div class="msg-time">${nowTime()}</div></div>`;
  } else {
    w.innerHTML = `<div><div class="msg-bubble">${content}</div><div class="msg-time" style="text-align:right">${nowTime()}</div></div>`;
  }
  chatMessages.appendChild(w);
  chatMessages.scrollTop = chatMessages.scrollHeight;
  return w;
}

function showTyping() {
  const t = document.createElement('div');
  t.id = 'typing'; t.className = 'msg bot';
  t.innerHTML = `${BOT_AV}<div class="msg-bubble"><div class="typing"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div></div>`;
  chatMessages.appendChild(t);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}
function hideTyping() { document.getElementById('typing')?.remove(); }

function botSay(text, delay = 800, isHtml = false) {
  return new Promise(res => {
    showTyping();
    setTimeout(() => { hideTyping(); addMsg('bot', text, isHtml); res(); }, delay);
  });
}

function setOpts(opts) {
  quickOpts.innerHTML = '';
  opts.forEach(o => {
    const b = document.createElement('button');
    b.className = 'qopt'; b.textContent = o.label;
    b.addEventListener('click', () => { track('quick_action_clicked', { label: o.label, page: CTX.page }); o.fn(); });
    quickOpts.appendChild(b);
  });
}

    <div class="wa-card-text"><h5>${esc(title)}</h5><p>${esc(sub)}</p></div>

function flashConfirm() {
  const fl = document.createElement('div'); fl.className = 'lead-flash';
  chatWindow.appendChild(fl);
  setTimeout(() => fl.remove(), 700);
}

// ╔══════════════════════════════════════════════════════════╗
// ║  CONVERSATION START (context-aware)                      ║
// ╚══════════════════════════════════════════════════════════╝
async function startConvo(auto = false) {
  leadData      = { pageType: CTX.page, sourcePage: CTX.sourceUrl };
  convoHistory  = [];
  awaitingInput = null;
  turnCount     = 0;
  track('lead_started', { page: CTX.page, auto });

  const ctx = PAGE_CTX[CTX.page] || PAGE_CTX['home'];

  // Greet based on page context
  if (auto) {
    await botSay("👋 Hey! Looks like you're exploring e-waste options.", 600);
    switch (ctx.greet) {
      case 'pickup-auto':
        await botSay("You're on our pickup page — let's get your <strong>free slot confirmed</strong> right now! ♻️", 1100);
        setTimeout(pickupFlow, 1800); return;
      case 'itad':
        await botSay("We handle <strong>corporate ITAD</strong> for Kochi enterprises — certified bulk disposal with full compliance docs. 🏢", 1100); break;
      case 'compliance':
        await botSay("Compliance is our core. Kerala PCB authorised, CPCB registered, DPDP Act 2023 compliant. 📋", 1100); break;
      case 'data':
        await botSay("We destroy data to <strong>NIST SP 800-88</strong> standard — every device gets a Certificate of Destruction. 🔒", 1100); break;
      case 'battery':
        await botSay("Free bulk pickup for <strong>lithium-ion, EV, and lead-acid batteries</strong> anywhere in Kerala. 🔋", 1100); break;
      default:
        await botSay("We offer <strong>free doorstep e-waste pickup</strong> across all of Kochi. What can I help you with? 🌿", 1100); break;
    }
  } else {
    await botSay("Hi! 👋 I'm EWaste Kochi's AI assistant.", 600);
    switch (ctx.greet) {
      case 'itad':
        await botSay("I can set up <strong>enterprise ITAD</strong> quotes, data destruction certs, and bulk pickup for your Kochi office. 🏢", 1200); break;
      case 'compliance':
        await botSay("We're Kerala PCB authorised & DPDP Act compliant. I can answer <strong>EPR & CPCB compliance</strong> questions. 📋", 1200); break;
      case 'data':
        await botSay("Need <strong>NIST 800-88 data destruction</strong>? I can schedule a service and generate your Certificate of Destruction. 🔒", 1200); break;
      default:
        await botSay("I help with <strong>free e-waste pickup</strong>, price quotes, and <strong>corporate ITAD</strong> across Kochi. 🌿", 1200); break;
    }
  }

  // Build quick suggestions — entity-aware if entities present
  const entityIds  = CTX.entities ? CTX.entities.split(',').map(s => s.trim()).filter(Boolean) : [];
  const entitySugg = entityIds.slice(0, 2).map(id => ENTITY_SUGGESTIONS[id]).filter(Boolean);
  const pageSugg   = ctx.suggestions || ['♻️ Schedule Pickup', '💰 Price Quote', '🏢 Corporate ITAD'];
  const combined   = [...new Set([...entitySugg, ...pageSugg])].slice(0, 4);

  setOpts([
    { label: '♻️ Free Pickup',         fn: pickupFlow },
    { label: '💰 Price Quote',          fn: priceFlow },
    { label: '🏢 Corporate ITAD',       fn: corporateFlow },
    { label: '🔒 Data Destruction',     fn: dataDestrFlow },
    { label: '❓ Ask a Question',        fn: askFlow },
    ...combined.map(label => ({ label, fn: () => handleFreeform(label) })),
  ].slice(0, 5));
}

// ╔══════════════════════════════════════════════════════════╗
// ║  FLOWS                                                   ║
// ╚══════════════════════════════════════════════════════════╝
async function pickupFlow(presetItems = null) {
  leadData.service = 'schedule-pickup'; setOpts([]); addMsg('user', '♻️ Schedule Free Pickup');

  await botSay("We cover Infopark, Kakkanad, Edapally, Aluva, Marine Drive — everywhere!", 1200);

  chatInput.placeholder = 'e.g. 50 laptops, 3 servers, old mobiles…';

}

async function priceFlow() {

}

async function corporateFlow() {

// ║  ITEM / QTY / AREA SELECTION                             ║
// ╚══════════════════════════════════════════════════════════╝
async function selectItem(item) {
  leadData.items = item; setOpts([]); addMsg('user', item);
  await qtyStep();
}

async function qtyStep() {
  await botSay(`Got it — <strong>${esc(leadData.items)}</strong>. Approximately how many units?`, 700);
  setOpts([
    { label: '1 – 10',       fn: () => selectQty('1–10') },
    { label: '10 – 50',      fn: () => selectQty('10–50') },
    { label: '50 – 200',     fn: () => selectQty('50–200') },
    { label: '200+ (bulk)',  fn: () => selectQty('200+ (bulk)') },
  ]);
}

async function selectQty(qty) {
  leadData.qty = qty; setOpts([]); addMsg('user', qty);
  if (qty === '200+ (bulk)') {
    await botSay("Excellent — bulk order! 🏢 Our corporate team will prioritise this.", 700);

  } else {
    await botSay(`✅ <strong>${qty} units</strong>. Which area in Kochi?`, 700);

  setOpts([
    { label: '🏙️ Infopark / Kakkanad',    fn: () => selectArea('Infopark/Kakkanad') },
    { label: '🛣️ Edapally / Kaloor',       fn: () => selectArea('Edapally/Kaloor') },
    { label: '🌊 Marine Drive / MG Road', fn: () => selectArea('Marine Drive/MG Road') },
    { label: '🚉 Aluva / Angamaly',       fn: () => selectArea('Aluva/Angamaly') },
    { label: '🏘️ Thrippunithura',         fn: () => selectArea('Thrippunithura') },
    { label: '📍 Other Kochi area',       fn: () => selectArea('Other Kochi area') },
  ]);
}

async function selectArea(area) {
  leadData.location = area; setOpts([]); addMsg('user', area);
  await botSay(`✅ <strong>${esc(area)}</strong> is fully covered.`, 700);
  await botSay("Almost done! Your name?", 1100);
  awaitingInput = 'name';
  chatInput.placeholder = 'Your name…';
  chatInput.focus();
  track('lead_name_step', { page: CTX.page });
}

// ╔══════════════════════════════════════════════════════════╗
// ║  INPUT HANDLER                                           ║
// ╚══════════════════════════════════════════════════════════╝
document.getElementById('sendBtn').addEventListener('click', handleInput);
chatInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleInput(); });

async function handleInput() {
  const val = chatInput.value.trim();
  if (!val) return;

  // Rate limit
  const now = Date.now();
  if (now - lastSendMs < SEND_COOLDOWN) return;
  lastSendMs = now;
  if (turnCount >= MAX_TURNS) {
    addMsg('bot', "We've been chatting a while! For more help, please connect with our team directly. 👇", false);
    offerWA('Hi EWaste Kochi! I need more help with e-waste disposal.');
    return;
  }
  turnCount++;
  chatInput.value = '';

  if (awaitingInput === 'freeform') {
    addMsg('user', val);
    await handleFreeform(val); return;
  }
  if (awaitingInput === 'items') {
    leadData.items = val; awaitingInput = null;
    chatInput.placeholder = 'Ask anything…';
    addMsg('user', val);
    await qtyStep(); return;
  }
  if (awaitingInput === 'company') {
    leadData.company = val; awaitingInput = null;
    chatInput.placeholder = 'Ask anything…';
    addMsg('user', val);
    await botSay(`Thanks, <strong>${esc(val)}</strong>! Approximately how many IT assets?`, 700);
    setOpts([
      { label: '50 – 200',  fn: () => selectQty('50–200') },
      { label: '200 – 500', fn: () => selectQty('200+') },
      { label: '500+',      fn: () => selectQty('200+ (bulk)') },
    ]); return;
  }
  if (awaitingInput === 'name') {
    leadData.name = val; awaitingInput = 'phone';
    chatInput.placeholder = 'Your WhatsApp number…';
    addMsg('user', val);
    await botSay(`Hi <strong>${esc(val)}</strong>! 👋 Your WhatsApp number (for slot confirmation)?`, 700);
    track('lead_name_captured', { page: CTX.page }); return;
  }
  if (awaitingInput === 'phone') {
    leadData.phone = val; awaitingInput = null;
    chatInput.placeholder = 'Ask anything…';
    addMsg('user', val);
    track('lead_phone_captured', { page: CTX.page });
    await showSummary(); return;
  }
  // Default
  addMsg('user', val);
  await handleFreeform(val);
}

// ╔══════════════════════════════════════════════════════════╗
// ║  RETRIEVAL-GROUNDED FREEFORM                             ║
// ╚══════════════════════════════════════════════════════════╝
async function fetchSnippets(query) {
  try {
    const res = await fetch(`${SNIPPETS_EP}?q=${encodeURIComponent(query)}&limit=3`, {
      signal: AbortSignal.timeout(2500),
    });
    if (!res.ok) return [];
    const data = await res.json();
    return Array.isArray(data.snippets) ? data.snippets : [];
  } catch { return []; }
}

async function handleFreeform(question) {
  showTyping();
  convoHistory.push({ role: 'user', content: question });
  track('ai_question_asked', { page: CTX.page });

  // Retrieve snippets for grounding
  const snippets = await fetchSnippets(question);
  if (snippets.length) track('snippet_retrieved', { count: snippets.length });

  const snippetBlock = snippets.length
    ? '\n\nRelevant knowledge from EWasteKochi wiki:\n' +
      snippets.map(s => `Q: ${s.question || s.heading}\nA: ${s.content || s.answer}`).join('\n\n')
    : '';

  if (!CLAUDE_PROXY) {
    hideTyping();
    const reply = buildLocalReply(question, snippets);
    addMsg('bot', reply, snippets.length > 0);
    convoHistory.push({ role: 'assistant', content: reply });
    if (convoHistory.length >= 4) setTimeout(() => offerWA(`Hi! Question: ${question}`), 1500);
    return;
  }

  const system = `You are EWaste Kochi's AI assistant. Kerala's leading ITAD & e-waste recycler.
Services: free doorstep pickup (all Ernakulam), NIST 800-88 data destruction, ITAD, HDD/SSD shredding ≤2mm, battery recycling, document shredding.
Phone: ${PHONE} | WhatsApp: ${WA_BASE}
Key facts: Kerala PCB & CPCB authorised, DPDP 2023 compliant, Certificate of Destruction per device, free bulk pickup, 5000+ clients, 4.9★.
Pricing: data wipe ₹150+/device, shredding ₹200+/drive, bulk pickup free.${snippetBlock}
Rules: warm and conversational, 2–3 sentences max, use emojis sparingly, always drive toward WA handoff or pickup booking.`;

  try {
    const res = await fetch(CLAUDE_PROXY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ system, messages: convoHistory, max_tokens: 300 }),
    });
    const data = await res.json();
    hideTyping();
    const reply = data.content?.[0]?.text || data.reply || `For fastest help, WhatsApp us at ${PHONE}!`;
    addMsg('bot', reply);
    convoHistory.push({ role: 'assistant', content: reply });
    if (convoHistory.length >= 4) setTimeout(() => offerWA(`Hi! Question: ${question}`), 1500);
  } catch {
    hideTyping();
    const reply = buildLocalReply(question, snippets);
    addMsg('bot', reply, snippets.length > 0);
  }
}

// Local reply builder (no proxy) — uses retrieved snippets or falls back to WA
function buildLocalReply(question, snippets) {
  if (snippets.length) {
    const s = snippets[0];
    const text = (s.content || s.answer || '').slice(0, 220);
    return `${text}…<br><span class="snippet-badge">📖 From EWasteKochi Wiki</span>`;
  }
  return `Great question! Let me connect you with our team for the most accurate answer. 📲`;
}

function offerWA(preMsg) {
  addWACard(
    `${WA_BASE}?text=${encodeURIComponent(preMsg || 'Hi EWaste Kochi! I need help with e-waste disposal.')}`,
    'Continue on WhatsApp',
    'Instant reply · Free quote · 9 AM – 7 PM',
  );
}

// ╔══════════════════════════════════════════════════════════╗
// ║  LEAD PERSISTENCE + SUMMARY                              ║
// ╚══════════════════════════════════════════════════════════╝
async function showSummary() {
  flashConfirm();
  const s = leadData;

  await botSay(`Perfect, <strong>${esc(s.name)}</strong>! Here's your booking summary:`, 600);

  const summaryHtml = `
    📋 <strong>Service:</strong> ${esc(s.service || 'schedule-pickup')}<br>
    📦 <strong>Items:</strong> ${esc(s.items || 'E-Waste')}<br>
    🔢 <strong>Quantity:</strong> ${esc(s.qty || 'TBC')}<br>
    📍 <strong>Area:</strong> ${esc(s.location || 'Kochi')}<br>
    📱 <strong>WhatsApp:</strong> ${esc(s.phone)}`;
  addMsg('bot', summaryHtml, true);

  // Persist lead to Supabase via /api/widget-contact
  const messageText = [
    `Service: ${s.service || 'schedule-pickup'}`,
    `Items: ${s.items || 'E-Waste'}`,
    `Quantity: ${s.qty || 'TBC'}`,
    `Location: ${s.location || 'Kochi'}`,
    s.company ? `Company: ${s.company}` : '',
  ].filter(Boolean).join('\n');

  try {
    await fetch(LEAD_EP, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name:          s.name,
        phone:         s.phone,
        company:       s.company   || undefined,
        service:       s.service   || 'schedule-pickup',
        items:         s.items,
        qty:           s.qty,
        location:      s.location,
        message:       messageText,
        pageType:      CTX.page,
        sourcePage:    CTX.sourceUrl,
        entityContext: CTX.entities || undefined,
        utmSource:     CTX.utmSource   || undefined,
        utmMedium:     CTX.utmMedium   || undefined,
        utmCampaign:   CTX.utmCampaign || undefined,
      }),
    });
  } catch (e) {
    console.warn('[Widget] Lead save failed:', e);
  }

  track('lead_completed', { service: s.service, page: CTX.page, qty: s.qty });
  // Notify parent
  try { window.parent.postMessage({ type: 'ewk_lead', lead: { ...s, page: CTX.page } }, '*'); } catch {}

  await botSay("✅ Our team will contact you within <strong>30 minutes</strong> to confirm your slot!", 1200);
  await botSay("Tap below to open WhatsApp — we'll send your slot confirmation there:", 2000);

  const waMsg = encodeURIComponent(`Hi EWaste Kochi! I'm ${s.name}, requesting ${s.service || 'pickup'} for ${s.items || 'e-waste'} (${s.qty}) from ${s.location}, Kochi. My number: ${s.phone}. Please confirm slot.`);
  addWACard(`${WA_BASE}?text=${waMsg}`, `Confirm Slot — ${esc(s.name)}`, `${esc(s.items)} · ${esc(s.location)} · ${esc(s.qty)}`);

  setOpts([{
    label: '🔄 Start Over',
    fn: () => {
      chatMessages.innerHTML = ''; quickOpts.innerHTML = '';
      startConvo(false);
    },
  }]);
}
